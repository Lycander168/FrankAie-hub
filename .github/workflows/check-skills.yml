name: check-skills

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate skill references, counts and versions
        run: python3 scripts/check_skills.py
